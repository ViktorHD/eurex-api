<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eurex API Explorer</title>
    <meta name="description" content="Query the Deutsche Börse Eurex GraphQL API and visualize results in an interactive table.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Feather Icons for lightweight modern icons -->
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <div class="app-layout">
        <!-- Vertical Left Nav -->
        <nav class="app-nav">
            <div class="nav-branding">Eurex API Explorer</div>
        </nav>

        <div class="app-main">
            <!-- Tabs Bar -->
            <div class="tabs-bar" id="tabsBar">
                <button class="add-tab-btn" id="addTabBtn"><i data-feather="plus"></i></button>
            </div>

            <!-- Header Action Bar -->
            <header class="action-bar">
                <div class="url-input-group">
                    <input type="text" id="apiUrl" value="https://api.developer.deutsche-boerse.com/eurex-prod-graphql/" placeholder="Enter Endpoint here...">
                </div>

                <div class="action-right">
                    <button id="toggleQueryBtn" class="secondary-btn query-btn">
                        <i data-feather="edit-3"></i> Query
                    </button>
                    <button id="toggleDocsBtn" class="secondary-btn docs-btn">
                        <i data-feather="book"></i> Docs
                    </button>
                </div>
            </header>

            <!-- Three Pane Split Layout -->
            <div class="workspace-grid">
                
                <!-- Left Pane: Query Editor & Drawer -->
                <section class="pane editor-pane" id="queryPane">
                    <div class="pane-header">
                        <div style="display: flex; align-items: center; gap: 16px;">
                            <span>Query</span>
                            <button id="runQueryBtn" class="primary-btn" style="height: 28px; padding: 0 16px; font-size: 0.75rem;">
                                <i data-feather="play" style="width: 14px; height: 14px;"></i> Run
                            </button>
                        </div>
                        <button id="closeQueryBtn" class="icon-btn"><i data-feather="x"></i></button>
                    </div>
                    <textarea id="queryInput" class="code-editor" spellcheck="false">
query {
  Contracts(filter: { Product: { eq: "FDAX" } }) {
    date
    data {
      ISIN
      Contract
      ExpirationDate
    }
  }
}
                    </textarea>
                    
                    <!-- Bottom Drawer for Headers -->
                    <div class="editor-drawer">
                        <div class="drawer-header" id="drawerToggle">
                            <span>Headers & Variables</span>
                            <i data-feather="chevron-up" id="drawerIcon"></i>
                        </div>
                        <div class="drawer-content" id="drawerContent">
                            <div class="control-group">
                                <label>X-DBP-APIKEY</label>
                                <input type="password" id="apiKey" placeholder="Enter your API key...">
                            </div>
                        </div>
                    </div>
                </section>

                <div class="resize-handle horizontal"></div>

                <!-- Middle Pane: Results Table -->
                <section class="pane results-pane">
                    <div class="pane-header">
                        <span>Result <span id="recordCounter" class="record-counter"></span></span>
                        <div class="results-actions">
                            <button id="downloadCsvBtn" class="icon-btn" title="Download CSV" disabled><i data-feather="download"></i> CSV</button>
                            <button id="downloadMdBtn" class="icon-btn" title="Download MD" disabled><i data-feather="file-text"></i> MD</button>
                        </div>
                    </div>
                    
                    <div class="table-container">
                        <div id="errorBox" class="error-card hidden"></div>
                        <div id="loadingIndicator" class="loading hidden">
                            <div class="skeleton skeleton-header"></div>
                            <div class="skeleton skeleton-row"></div>
                            <div class="skeleton skeleton-row"></div>
                            <div class="skeleton skeleton-row" style="width: 80%;"></div>
                            <div class="skeleton skeleton-row" style="width: 90%;"></div>
                        </div>
                        <div id="emptyState" class="empty-state">
                            <i data-feather="database"></i>
                            <div>
                                <h3>No Data to Display</h3>
                                <p>Run a query to see results here.</p>
                                <p style="margin-top: 8px; font-size: 0.85rem;"><a href="https://www.eurex.com/ex-en/data/free-reference-data-api" target="_blank" rel="noopener" style="color: #00ce7d; text-decoration: none;">Learn more about the Eurex API →</a></p>
                            </div>
                        </div>
                        <table id="resultsTable" class="hidden">
                            <thead id="tableHead"></thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </section>

                <div class="resize-handle horizontal hidden" id="docsSplitter"></div>

                <!-- Right Pane: Docs (Schema Introspection) -->
                <section class="pane docs-pane hidden" id="docsPane">
                    <div class="pane-header">
                        <span>Schema Explorer</span>
                        <button id="closeDocsBtn" class="icon-btn"><i data-feather="x"></i></button>
                    </div>
                    <div class="docs-content" id="docsContent">
                        <input type="text" id="docsSearch" placeholder="Search types and fields..." class="docs-search">
                        <div id="docsLoading" class="docs-loading hidden">
                            <div class="skeleton skeleton-header" style="width: 70%;"></div>
                            <div class="skeleton skeleton-row"></div>
                            <div class="skeleton skeleton-row" style="width: 50%;"></div>
                        </div>
                        <div id="docsEmpty" class="empty-state hidden" style="margin-top: 40px;">
                            <i data-feather="book-open"></i>
                            <div>
                                <h3>Schema Explorer</h3>
                                <p>Click <strong>Docs</strong> to introspect.</p>
                            </div>
                        </div>
                        <div id="docsTree" class="docs-tree hidden"></div>
                    </div>
                </section>

            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
    <script>
      feather.replace();
    </script>
</body>
</html>
